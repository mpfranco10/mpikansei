<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title id="pageTitle"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles2.css" />
    <script type="module" src="mpi.js"></script>
  </head>

  <body>
    <div id="container">
      <div id="header">
        <img id="logo" src="logo.png" alt="Lee Lab Logo" />
        <h1 id="mainTitle"></h1>
      </div>

      <div id="description"></div>

      <div id="note"></div>

      <form id="quizForm">
        <div id="quiz"></div>

        <div class="nav">
          <button type="button" id="prevBtn"></button>
          <button type="button" id="nextBtn"></button>

          <button type="submit" id="submitBtn" style="display: none"></button>
        </div>
      </form>

      <div id="results"></div>

      <div id="plotContainer" style="display: none; margin-top: 30px">
        <h2 id="plotTitle"></h2>

        <div class="canvas-wrapper">
          <canvas id="scoreChart"></canvas>
        </div>
      </div>
    </div>
  </body>
</html>
